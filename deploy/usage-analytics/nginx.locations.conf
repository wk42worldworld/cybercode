# Place this zone in nginx's http context (usually before the server block).
limit_req_zone $binary_remote_addr zone=cybercode_usage:10m rate=12r/m;

# Place these locations inside the existing HTTPS server block.
location = /api/cybercode-usage/heartbeat {
    access_log off;
    client_max_body_size 4k;
    limit_req zone=cybercode_usage burst=6 nodelay;
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-CyberCode-Client-IP $remote_addr;
}

location = /api/cybercode-usage/summary {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /api/cybercode-usage/login {
    client_max_body_size 2k;
    limit_req zone=cybercode_usage burst=4 nodelay;
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /api/cybercode-usage/logout {
    client_max_body_size 1k;
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /cybercode-stats {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /cybercode-stats/ {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /cybercode-stats/login {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /cybercode-stats/assets/ {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}
