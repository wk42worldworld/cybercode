name: Release Desktop

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'
            label: macOS-ARM64
            asset_suffix: macos_arm64

          # macOS Intel
          - platform: macos-15-intel
            rust_target: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'
            label: macOS-x64
            asset_suffix: macos_x64

          # Linux x64
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: '--bundles deb'
            label: Linux-x64
            asset_suffix: linux_x64

          # Windows x64
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: '--bundles nsis'
            label: Windows-x64
            asset_suffix: windows_x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' desktop/src-tauri/tauri.conf.json)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches version
        if: github.event_name == 'push'
        shell: bash
        run: |
          EXPECTED_TAG="v${{ steps.version.outputs.value }}"
          if [ "${GITHUB_REF_NAME}" != "$EXPECTED_TAG" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match app version ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Load release notes
        id: release_notes
        shell: bash
        run: |
          NOTES_FILE="release-notes/v${{ steps.version.outputs.value }}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::warning::Missing release notes file: $NOTES_FILE — using empty body"
            {
              echo 'body<<__RELEASE_NOTES__'
              echo 'CyberCode v${{ steps.version.outputs.value }}'
              echo '__RELEASE_NOTES__'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'body<<__RELEASE_NOTES__'
              cat "$NOTES_FILE"
              echo
              echo '__RELEASE_NOTES__'
            } >> "$GITHUB_OUTPUT"
          fi

      # ── System dependencies (Linux) ──────────────────────────
      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            zip \
            libfuse2

      # ── Bun ──────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Bun currently cannot move a newly downloaded compile runtime from the
      # runner's D: checkout to its C: cache on Windows. Warm the baseline
      # runtime from C: once so the real sidecar build can reuse it.
      - name: Warm Windows Bun baseline runtime
        if: matrix.rust_target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $warmupDir = Join-Path $env:USERPROFILE 'cybercode-bun-baseline-warmup'

          Remove-Item $warmupDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item $warmupDir -ItemType Directory -Force | Out-Null
          Set-Content `
            -Path (Join-Path $warmupDir 'warmup.ts') `
            -Value "console.log('CyberCode sidecar runtime warmup')" `
            -Encoding utf8NoBOM

          Push-Location $warmupDir
          try {
            $built = $false
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              Write-Host "Warming Bun baseline runtime (attempt $attempt/3)..."
              & bun build .\warmup.ts `
                --compile `
                --target=bun-windows-x64-baseline `
                --outfile .\warmup.exe

              if ($LASTEXITCODE -eq 0) {
                $built = $true
                break
              }

              if ($attempt -lt 3) {
                & bun pm cache rm
                Start-Sleep -Seconds (2 * $attempt)
              }
            }

            if (-not $built) {
              throw 'Failed to prepare the Bun Windows baseline runtime after 3 attempts.'
            }
          } finally {
            Pop-Location
            Remove-Item $warmupDir -Recurse -Force -ErrorAction SilentlyContinue
          }

      # ── Node.js (for tauri-action compatibility) ─────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Rust ─────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'desktop/src-tauri -> target'
          shared-key: ${{ matrix.rust_target }}

      # ── Install dependencies ─────────────────────────────────
      - name: Install root dependencies
        run: bun install

      - name: Install desktop dependencies
        working-directory: desktop
        run: bun install

      - name: Install adapter dependencies
        working-directory: adapters
        run: bun install

      - name: Validate built-in tool result contracts
        run: bun test src/tools/toolContract.test.ts

      - name: Validate desktop sidecar helpers
        working-directory: desktop
        run: bun run test:sidecars

      # ── Build sidecars ───────────────────────────────────────
      - name: Build sidecars
        working-directory: desktop
        env:
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.rust_target }}
        run: bun run build:sidecars

      - name: Smoke-test sidecar server startup
        working-directory: desktop
        env:
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.rust_target }}
        run: bun run ./scripts/smoke-test-sidecar.ts

      - name: Validate updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required to publish updater artifacts."
            echo "::error::Generate a Tauri updater key and save the private key as a GitHub Actions secret."
            exit 1
          fi

      - name: Validate Apple notarization config
        if: startsWith(matrix.platform, 'macos') && vars.ENABLE_APPLE_NOTARIZATION == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required when ENABLE_APPLE_NOTARIZATION=true."
              missing=1
            fi
          done
          exit "$missing"

      # ── Build Tauri app ──────────────────────────────────────
      - name: Build Tauri app
        if: vars.ENABLE_APPLE_NOTARIZATION != 'true' || !startsWith(matrix.platform, 'macos')
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && '-' || '' }}
        with:
          projectPath: desktop
          tauriScript: bunx tauri
          args: ${{ matrix.tauri_args }} --config src-tauri/tauri.release-ci.json

      - name: Build Tauri app with Apple notarization
        if: startsWith(matrix.platform, 'macos') && vars.ENABLE_APPLE_NOTARIZATION == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tauriScript: bunx tauri
          args: ${{ matrix.tauri_args }} --config src-tauri/tauri.release-ci.json

      - name: Collect release assets
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.value }}
          LABEL: ${{ matrix.label }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
        run: |
          set -euo pipefail

          OUT="$RUNNER_TEMP/release-assets"
          mkdir -p "$OUT"

          copy_first() {
            local pattern="$1"
            local dest="$2"
            local src
            src="$(find desktop/src-tauri/target -type f -path "$pattern" | sort | head -n 1)"
            if [ -z "$src" ]; then
              echo "::error::Missing build artifact matching $pattern"
              find desktop/src-tauri/target -type f | sort
              exit 1
            fi
            cp "$src" "$OUT/$dest"
          }

          case "$LABEL" in
            macOS-ARM64|macOS-x64)
              copy_first '*/bundle/macos/*.app.tar.gz' "CyberCode_${VERSION}_${ASSET_SUFFIX}_app.app.tar.gz"
              copy_first '*/bundle/macos/*.app.tar.gz.sig' "CyberCode_${VERSION}_${ASSET_SUFFIX}_app.app.tar.gz.sig"
              copy_first '*/bundle/dmg/*.dmg' "CyberCode_${VERSION}_${ASSET_SUFFIX}_dmg.dmg"

              app_bundle="$(find desktop/src-tauri/target -type d -path '*/bundle/macos/*.app' | sort | head -n 1)"
              if [ -z "$app_bundle" ]; then
                echo "::error::Missing macOS app bundle for ZIP packaging"
                find desktop/src-tauri/target -type d | sort
                exit 1
              fi
              ditto -c -k --sequesterRsrc --keepParent \
                "$app_bundle" \
                "$OUT/CyberCode_${VERSION}_${ASSET_SUFFIX}.zip"
              unzip -t "$OUT/CyberCode_${VERSION}_${ASSET_SUFFIX}.zip"
              ;;
            Linux-x64)
              deb_name="CyberCode_${VERSION}_${ASSET_SUFFIX}_deb.deb"
              copy_first '*/bundle/deb/*.deb' "$deb_name"
              copy_first '*/bundle/deb/*.deb.sig' "${deb_name}.sig"
              (
                cd "$OUT"
                zip -9 "CyberCode_${VERSION}_${ASSET_SUFFIX}.zip" "$deb_name"
              )
              unzip -t "$OUT/CyberCode_${VERSION}_${ASSET_SUFFIX}.zip"
              ;;
            Windows-x64)
              nsis_name="CyberCode_${VERSION}_${ASSET_SUFFIX}_nsis.exe"
              copy_first '*/bundle/nsis/*.exe' "$nsis_name"
              copy_first '*/bundle/nsis/*.exe.sig' "${nsis_name}.sig"
              (
                cd "$OUT"
                7z a -bd -tzip "CyberCode_${VERSION}_${ASSET_SUFFIX}.zip" "$nsis_name"
              )
              7z t "$OUT/CyberCode_${VERSION}_${ASSET_SUFFIX}.zip"
              ;;
            *)
              echo "::error::Unknown release label: $LABEL"
              exit 1
              ;;
          esac

          ls -la "$OUT"

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: ${{ runner.temp }}/release-assets/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-22.04
    name: Publish Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' desktop/src-tauri/tauri.conf.json)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.value }}"
          TAG_NAME="v${VERSION}"

          if [ "${{ github.event_name }}" = "push" ] && [ "${GITHUB_REF_NAME}" != "$TAG_NAME" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match app version ${TAG_NAME}"
            exit 1
          fi

          git fetch --force --tags
          if ! git rev-parse --verify --quiet "refs/tags/$TAG_NAME" >/dev/null; then
            echo "::error::Tag $TAG_NAME does not exist. Use the release script to create a version commit and tag first."
            exit 1
          fi

          NOTES_FILE="release-notes/${TAG_NAME}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Missing release notes file: $NOTES_FILE"
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "::error::Release $TAG_NAME already exists. Bump the version before publishing."
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Validate release assets
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail

          required=(
            "CyberCode_${VERSION}_macos_arm64_app.app.tar.gz"
            "CyberCode_${VERSION}_macos_arm64_app.app.tar.gz.sig"
            "CyberCode_${VERSION}_macos_arm64_dmg.dmg"
            "CyberCode_${VERSION}_macos_arm64.zip"
            "CyberCode_${VERSION}_macos_x64_app.app.tar.gz"
            "CyberCode_${VERSION}_macos_x64_app.app.tar.gz.sig"
            "CyberCode_${VERSION}_macos_x64_dmg.dmg"
            "CyberCode_${VERSION}_macos_x64.zip"
            "CyberCode_${VERSION}_linux_x64_deb.deb"
            "CyberCode_${VERSION}_linux_x64_deb.deb.sig"
            "CyberCode_${VERSION}_linux_x64.zip"
            "CyberCode_${VERSION}_windows_x64_nsis.exe"
            "CyberCode_${VERSION}_windows_x64_nsis.exe.sig"
            "CyberCode_${VERSION}_windows_x64.zip"
          )

          for file in "${required[@]}"; do
            if [ ! -s "release-assets/$file" ]; then
              echo "::error::Missing required release asset: $file"
              find release-assets -type f | sort
              exit 1
            fi
          done

      - name: Generate updater manifest
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.value }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          NOTES_FILE: ${{ steps.release.outputs.notes_file }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('node:fs')
          const version = process.env.VERSION
          const tagName = process.env.TAG_NAME
          const repo = process.env.GITHUB_REPOSITORY
          const notes = fs.readFileSync(process.env.NOTES_FILE, 'utf8').trim()
          const baseUrl = `https://github.com/${repo}/releases/download/${tagName}`
          const mirrorManifests = [
            {
              name: 'latest-gh-proxy.json',
              baseUrl: `https://gh-proxy.com/${baseUrl}`,
            },
            {
              name: 'latest-ghfast.json',
              baseUrl: `https://ghfast.top/${baseUrl}`,
            },
          ]

          const sig = (name) => fs.readFileSync(`release-assets/${name}.sig`, 'utf8').trim()
          const asset = (base, name) => ({ signature: sig(name), url: `${base}/${name}` })

          const macArm = `CyberCode_${version}_macos_arm64_app.app.tar.gz`
          const macX64 = `CyberCode_${version}_macos_x64_app.app.tar.gz`
          const linux = `CyberCode_${version}_linux_x64_deb.deb`
          const windows = `CyberCode_${version}_windows_x64_nsis.exe`

          const createManifest = (assetBaseUrl) => ({
            version,
            notes,
            pub_date: new Date().toISOString(),
            platforms: {
              'darwin-aarch64': asset(assetBaseUrl, macArm),
              'darwin-aarch64-app': asset(assetBaseUrl, macArm),
              'darwin-x86_64': asset(assetBaseUrl, macX64),
              'darwin-x86_64-app': asset(assetBaseUrl, macX64),
              'linux-x86_64': asset(assetBaseUrl, linux),
              'linux-x86_64-deb': asset(assetBaseUrl, linux),
              'windows-x86_64': asset(assetBaseUrl, windows),
              'windows-x86_64-nsis': asset(assetBaseUrl, windows),
            },
          })

          fs.writeFileSync('release-assets/latest.json', `${JSON.stringify(createManifest(baseUrl), null, 2)}\n`)
          for (const mirror of mirrorManifests) {
            fs.writeFileSync(
              `release-assets/${mirror.name}`,
              `${JSON.stringify(createManifest(mirror.baseUrl), null, 2)}\n`,
            )
          }
          NODE

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.version.outputs.value }}
          NOTES_FILE: ${{ steps.release.outputs.notes_file }}
          RELEASE_DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
        run: |
          set -euo pipefail

          draft_arg=()
          if [ "$RELEASE_DRAFT" = "true" ]; then
            draft_arg=(--draft)
          fi

          gh release create "$TAG_NAME" release-assets/* \
            --title "CyberCode v${VERSION}" \
            --notes-file "$NOTES_FILE" \
            "${draft_arg[@]}"
